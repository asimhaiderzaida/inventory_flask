{% extends "public_base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1rem;text-align:center;">
  <i class="bi bi-exclamation-triangle-fill" style="font-size:4rem;color:var(--color-danger);"></i>
  <h2 style="margin-top:1.5rem;font-size:1.75rem;font-weight:700;">Something Went Wrong</h2>
  <p style="color:var(--text-muted);margin-top:0.5rem;max-width:400px;">
    An unexpected error occurred. The issue has been logged. Please try again or contact your administrator if it persists.
  </p>
  <a href="/main_dashboard" class="btn btn-primary mt-3">
    <i class="bi bi-house me-2"></i>Go to Dashboard
  </a>
</div>
{% endblock %}
