{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5rem 1rem;text-align:center;">
  <i class="bi bi-shield-lock-fill" style="font-size:4rem;color:var(--color-danger);"></i>
  <h2 style="margin-top:1.5rem;font-size:1.75rem;font-weight:700;">Access Denied</h2>
  <p style="color:var(--text-muted);margin-top:0.5rem;max-width:400px;">
    You don't have permission to access this page. Contact your administrator if you believe this is an error.
  </p>
  <a href="{{ url_for('dashboard_bp.main_dashboard') }}" class="btn btn-primary mt-3">
    <i class="bi bi-house me-2"></i>Go to Dashboard
  </a>
</div>
{% endblock %}
