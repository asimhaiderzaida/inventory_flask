{% extends "base.html" %}
{% block title %}New Order{% endblock %}
{% block page_title %}New Order{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">New Order</h1>
    <div class="page-subtitle">Create a customer purchase request</div>
  </div>
  <div class="page-actions">
    <a href="{{ url_for('orders_bp.index') }}" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>
</div>

<div class="table-card animate-fade-up" style="max-width:680px;padding:1.5rem;">
  <form method="post" action="{{ url_for('orders_bp.new_order') }}" id="new-order-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="customer_id" id="customer-id-input">

    <!-- Customer -->
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:0.84rem;">Customer</label>
      <input type="text" id="customer-search-input" class="form-control"
             placeholder="Search existing customer or type free-text name…"
             autocomplete="off">
      <input type="text" name="customer_name" id="customer-name-hidden"
             style="display:none;">
      <div id="customer-dropdown"
           style="position:absolute;z-index:999;background:var(--surface);border:1px solid var(--border);
                  border-radius:var(--radius-md);box-shadow:var(--shadow-md);min-width:320px;display:none;">
      </div>
      <div id="customer-selected-badge" style="display:none;margin-top:0.4rem;">
        <span class="badge bg-primary" style="font-size:0.78rem;" id="customer-badge-text"></span>
        <button type="button" class="btn btn-ghost btn-sm ms-1" onclick="clearCustomer()" style="padding:0.1rem 0.4rem;font-size:0.72rem;">✕</button>
      </div>
    </div>

    <!-- Model Description -->
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:0.84rem;">Model / Description <span class="text-danger">*</span></label>
      <input type="text" name="model_description" class="form-control" required
             placeholder="e.g. Dell Latitude 5320 i7 16GB 512GB">
    </div>

    <!-- Qty + Price row -->
    <div class="row g-3 mb-3">
      <div class="col-sm-4">
        <label class="form-label fw-semibold" style="font-size:0.84rem;">Quantity</label>
        <input type="number" name="quantity" id="qty-input" class="form-control"
               value="1" min="1" oninput="updateTotal()">
      </div>
      <div class="col-sm-4">
        <label class="form-label fw-semibold" style="font-size:0.84rem;">Price per unit (AED)</label>
        <input type="number" name="expected_price" id="price-input" class="form-control"
               step="0.01" min="0" placeholder="0" oninput="updateTotal()">
      </div>
      <div class="col-sm-4">
        <label class="form-label fw-semibold" style="font-size:0.84rem;">Total Budget (AED)</label>
        <input type="text" id="total-display" class="form-control" readonly
               style="background:var(--surface-2);color:var(--primary);font-weight:600;" placeholder="—">
      </div>
    </div>

    <!-- Delivery Date -->
    <div class="mb-3">
      <label class="form-label fw-semibold" style="font-size:0.84rem;">Delivery Date</label>
      <input type="date" name="delivery_date" class="form-control">
    </div>

    <!-- Deposit row -->
    <div class="row g-3 mb-3">
      <div class="col-sm-5">
        <label class="form-label fw-semibold" style="font-size:0.84rem;">Deposit Amount (AED)</label>
        <input type="number" name="deposit_amount" class="form-control" step="0.01" min="0" placeholder="Optional">
      </div>
      <div class="col-sm-4">
        <label class="form-label fw-semibold" style="font-size:0.84rem;">Payment Status</label>
        <select name="payment_status" class="form-select">
          <option value="none">None</option>
          <option value="deposit">Deposit Taken</option>
          <option value="full">Fully Paid</option>
        </select>
      </div>
      <div class="col-sm-3 d-flex align-items-end">
        <div class="form-check mb-2">
          <input type="checkbox" name="deposit_paid" id="deposit-paid-cb" class="form-check-input" value="1">
          <label for="deposit-paid-cb" class="form-check-label" style="font-size:0.84rem;">Deposit Paid</label>
        </div>
      </div>
    </div>

    <!-- Notes -->
    <div class="mb-4">
      <label class="form-label fw-semibold" style="font-size:0.84rem;">Notes</label>
      <textarea name="notes" class="form-control" rows="3" placeholder="Any special requirements…"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-check-lg me-1"></i> Save Order
      </button>
      <a href="{{ url_for('orders_bp.index') }}" class="btn btn-ghost">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let _customerSearchTimer = null;

function updateTotal() {
  const qty   = parseFloat(document.getElementById('qty-input').value) || 0;
  const price = parseFloat(document.getElementById('price-input').value) || 0;
  const total = qty * price;
  document.getElementById('total-display').value = total > 0 ? total.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}) : '';
}

const searchInput = document.getElementById('customer-search-input');
const dropdown    = document.getElementById('customer-dropdown');
const idInput     = document.getElementById('customer-id-input');
const nameHidden  = document.getElementById('customer-name-hidden');

searchInput.addEventListener('input', function() {
  const q = this.value.trim();
  nameHidden.value = q;  // always sync free-text
  idInput.value    = '';
  clearTimeout(_customerSearchTimer);
  if (q.length < 2) { dropdown.style.display = 'none'; return; }
  _customerSearchTimer = setTimeout(() => {
    fetch(`{{ url_for('orders_bp.customer_search') }}?q=${encodeURIComponent(q)}`)
      .then(r => r.json())
      .then(results => {
        if (!results.length) { dropdown.style.display = 'none'; return; }
        dropdown.innerHTML = results.map(c =>
          `<div class="dropdown-item" style="cursor:pointer;padding:0.5rem 0.75rem;font-size:0.84rem;"
                onclick="selectCustomer(${c.id}, '${escHtml(c.name)}', '${escHtml(c.phone)}')">
            <strong>${escHtml(c.name)}</strong>
            ${c.phone ? `<span style="color:var(--text-muted);font-size:0.78rem;margin-left:0.5rem;">${escHtml(c.phone)}</span>` : ''}
          </div>`
        ).join('');
        dropdown.style.display = 'block';
      });
  }, 250);
});

document.addEventListener('click', function(e) {
  if (!dropdown.contains(e.target) && e.target !== searchInput) dropdown.style.display = 'none';
});

function selectCustomer(id, name, phone) {
  idInput.value    = id;
  nameHidden.value = name;
  searchInput.value = name;
  dropdown.style.display = 'none';
  document.getElementById('customer-badge-text').textContent = name + (phone ? ' · ' + phone : '');
  document.getElementById('customer-selected-badge').style.display = 'block';
}

function clearCustomer() {
  idInput.value   = '';
  nameHidden.value = '';
  searchInput.value = '';
  document.getElementById('customer-selected-badge').style.display = 'none';
}

// Validate customer_name on submit
document.getElementById('new-order-form').addEventListener('submit', function(e) {
  const name = (nameHidden.value || searchInput.value || '').trim();
  if (!name) { e.preventDefault(); showToast('Please enter a customer name.', 'warning'); return; }
  nameHidden.value = name;
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
{% endblock %}
