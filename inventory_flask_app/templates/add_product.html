{% extends "base.html" %}
{% block title %}Add Single Unit{% endblock %}
{% block page_title %}Add Single Unit{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">Add Single Unit</h1>
    <div class="page-subtitle">Manually add one serialized unit to inventory</div>
  </div>
  <div class="page-actions">
    <a href="javascript:history.back()" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Cancel
    </a>
  </div>
</div>

<div class="animate-fade-up" style="max-width:720px;">
  <div class="card">
    <div class="card-body" style="padding:1.75rem;">
      <form method="POST" action="{{ url_for('stock_bp.add_product_page') }}" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Identity -->
        <div class="col-12"><div class="fw-semibold text-muted small text-uppercase mb-1">Identity</div></div>
        <div class="col-md-6">
          <label class="form-label">Serial Number <span class="text-danger">*</span></label>
          <input type="text" name="serial" class="form-control" required autofocus placeholder="e.g. SN123456">
        </div>
        <div class="col-md-6">
          <label class="form-label">Asset Tag</label>
          <input type="text" name="asset" class="form-control" placeholder="e.g. ASSET-001">
        </div>

        <!-- Product specs -->
        <div class="col-12 mt-2"><div class="fw-semibold text-muted small text-uppercase mb-1">Product Specs</div></div>
        <div class="col-md-4">
          <label class="form-label">Make</label>
          <input type="text" name="make" class="form-control" placeholder="e.g. Dell">
        </div>
        <div class="col-md-4">
          <label class="form-label">Model</label>
          <input type="text" name="model" class="form-control" placeholder="e.g. Latitude 5420">
        </div>
        <div class="col-md-4">
          <label class="form-label">Item Name</label>
          <input type="text" name="item_name" class="form-control" placeholder="e.g. Laptop">
        </div>
        <div class="col-md-6">
          <label class="form-label">CPU</label>
          <input type="text" name="cpu" class="form-control" placeholder="e.g. Core i5-1135G7">
        </div>
        <div class="col-md-3">
          <label class="form-label">RAM</label>
          <input type="text" name="ram" class="form-control" placeholder="e.g. 16GB">
        </div>
        <div class="col-md-3">
          <label class="form-label">Storage</label>
          <input type="text" name="disk1size" class="form-control" placeholder="e.g. 256GB SSD">
        </div>
        <div class="col-md-4">
          <label class="form-label">Display</label>
          <input type="text" name="display" class="form-control" placeholder='e.g. 14"'>
        </div>
        <div class="col-md-4">
          <label class="form-label">GPU</label>
          <input type="text" name="gpu1" class="form-control" placeholder="e.g. Intel Iris Xe">
        </div>
        <div class="col-md-4">
          <label class="form-label">Grade</label>
          <select name="grade" class="form-select">
            <option value="">— Select —</option>
            <option value="A">A</option>
            <option value="A+">A+</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>

        <!-- Intake settings -->
        <div class="col-12 mt-2"><div class="fw-semibold text-muted small text-uppercase mb-1">Intake Settings</div></div>
        <div class="col-md-4">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            <option value="unprocessed" selected>Unprocessed</option>
            <option value="under_process">Under Process</option>
            <option value="processed">Processed</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Vendor</label>
          <select name="vendor_id" class="form-select">
            <option value="">— None —</option>
            {% for v in vendors %}
            <option value="{{ v.id }}">{{ v.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Location</label>
          <select name="location_id" class="form-select">
            <option value="">— None —</option>
            {% for loc in locations %}
            <option value="{{ loc.id }}">{{ loc.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Purchase Cost <span class="text-muted fw-normal">(optional)</span></label>
          <div class="input-group">
            <span class="input-group-text">AED</span>
            <input type="number" name="purchase_cost" class="form-control" min="0" step="0.01" placeholder="0.00">
          </div>
        </div>

        <div class="col-12 pt-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check2-circle"></i> Add Unit
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
