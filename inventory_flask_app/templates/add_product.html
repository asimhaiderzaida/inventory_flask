{% extends "base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">Add New Product</h1>
    <div class="page-subtitle">Enter product details</div>
  </div>
  <div class="page-actions">
    <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('dashboard_bp.main_dashboard') }}'" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Cancel
    </a>
  </div>
</div>

<div class="animate-fade-up" style="max-width:640px;">
  <div class="card">
    <div class="card-body" style="padding:1.75rem;">
      <form method="POST" action="{{ url_for('stock_bp.add_product_page') }}" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="col-md-6">
          <label class="form-label">Product Name</label>
          <input type="text" name="name" class="form-control" required autofocus>
        </div>
        <div class="col-md-6">
          <label class="form-label">Model Number</label>
          <input type="text" name="model_number" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Serial Number</label>
          <input type="text" name="serial_number" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label">Asset Tag</label>
          <input type="text" name="asset_tag" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">RAM</label>
          <input type="text" name="ram" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Processor</label>
          <input type="text" name="processor" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Storage</label>
          <input type="text" name="storage" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Screen Size</label>
          <input type="text" name="screen_size" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Resolution</label>
          <input type="text" name="resolution" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Grade</label>
          <select name="grade" class="form-select">
            <option value="">Select Grade</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Video Card</label>
          <input type="text" name="video_card" class="form-control">
        </div>
        <div class="col-md-6">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            <option value="unprocessed" selected>Unprocessed</option>
            <option value="under_process">Under Process</option>
            <option value="processed">Processed</option>
            <option value="sold">Sold</option>
          </select>
        </div>
        <div class="col-12">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check2-circle"></i> Save Product
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
