{% extends "base.html" %}
{% block title %}Register User{% endblock %}
{% block page_title %}Register User{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">Register New User</h1>
    <div class="page-subtitle">Add a new team member to your account</div>
  </div>
  <div class="page-actions">
    <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('admin_bp.admin_settings') }}'" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>
</div>

<div class="animate-fade-up" style="max-width:520px;">
  <div class="card">
    <div class="card-body" style="padding:1.75rem;">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input name="full_name" type="text" class="form-control" placeholder="e.g. Jane Smith" required autofocus>
        </div>

        <div class="mb-3">
          <label class="form-label">Username</label>
          <input name="username" type="text" class="form-control" placeholder="Unique login username" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Email <span style="font-weight:400;color:var(--text-muted);">(required for password reset)</span></label>
          <input name="email" type="email" class="form-control" placeholder="user@company.com">
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" placeholder="Set a secure password" required>
        </div>

        <div class="mb-4">
          <label class="form-label">Role</label>
          <select name="role" class="form-select">
            <option value="technician" selected>Technician</option>
            <option value="admin">Admin</option>
            <option value="supervisor">Supervisor</option>
            <option value="staff">Staff</option>
          </select>
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-person-plus"></i> Register User
          </button>
          <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('admin_bp.admin_settings') }}'" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
