{% extends "base.html" %}
{% block title %}Welcome{% endblock %}
{% block page_title %}Welcome{% endblock %}

{% block content %}
<div class="animate-fade-up" style="max-width:480px;">
  <div class="card">
    <div class="card-body" style="padding:2rem;text-align:center;">
      <div style="width:56px;height:56px;background:var(--primary);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;">
        <i class="bi bi-boxes" style="font-size:1.5rem;color:#fff;"></i>
      </div>
      <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:0.5rem;">Welcome!</h2>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;">Manage your inventory with ease and efficiency.</p>
      <a href="{{ url_for('dashboard_bp.main_dashboard') }}" class="btn btn-primary w-100" style="min-height:46px;justify-content:center;">
        <i class="bi bi-speedometer2"></i> Go to Dashboard
      </a>
    </div>
  </div>
</div>
{% endblock %}
