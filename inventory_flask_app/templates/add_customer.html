{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}
{% block page_title %}Add Customer{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">Add Customer</h1>
    <div class="page-subtitle">Create a new customer profile</div>
  </div>
  <div class="page-actions">
    <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('customers_bp.customer_center') }}'" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>
</div>

<div class="animate-fade-up" style="max-width:600px;">
  <div class="card">
    <div class="card-body" style="padding:1.75rem;">
      <form method="POST" action="{{ url_for('customers_bp.add_customer') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <!-- Contact -->
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.75rem;">Contact Information</div>
        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Customer Name <span style="color:var(--color-danger);">*</span></label>
            <input type="text" class="form-control" name="name" placeholder="Full name" required autofocus>
          </div>
          <div class="col-md-6">
            <label class="form-label">Company / Organization</label>
            <input type="text" class="form-control" name="company" placeholder="Company name (optional)">
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" name="phone" placeholder="Phone number">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" placeholder="Email address">
          </div>
          <div class="col-md-6">
            <label class="form-label">TRN <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">(Tax Registration Number)</span></label>
            <input type="text" class="form-control" name="trn" placeholder="15-digit Tax Registration Number"
                   maxlength="20" pattern="[0-9]{15}" title="UAE TRN is 15 digits">
          </div>
        </div>

        <!-- Address -->
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.75rem;margin-top:0.5rem;">Address (optional)</div>
        <div class="row g-3 mb-3">
          <div class="col-12">
            <label class="form-label">Street Address</label>
            <input type="text" class="form-control" name="address" placeholder="Street / building / PO box">
          </div>
          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" class="form-control" name="city" placeholder="City">
          </div>
          <div class="col-md-6">
            <label class="form-label">Country</label>
            <select class="form-select" name="country">
              <option value="">— Select country —</option>
              {% for c in [
                'United Arab Emirates','Saudi Arabia','Kuwait','Qatar','Bahrain','Oman',
                'United Kingdom','United States','Canada','Australia','India','Pakistan',
                'Egypt','Jordan','Lebanon','Turkey','Germany','France','Netherlands',
                'Singapore','Malaysia','Philippines','Nigeria','Kenya','South Africa',
                'Other'
              ] %}
              <option value="{{ c }}">{{ c }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- Internal Notes -->
        <div style="font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:0.75rem;margin-top:0.5rem;">Internal Notes</div>
        <div class="mb-4">
          <label class="form-label">Staff Notes <span style="font-size:0.75rem;color:var(--text-muted);font-weight:400;">(not visible to customer)</span></label>
          <textarea class="form-control" name="notes" rows="3" placeholder="E.g. preferred contact hours, special pricing, account notes…"></textarea>
        </div>

        <div class="d-flex gap-2">
          <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('customers_bp.customer_center') }}'" class="btn btn-ghost flex-fill">Cancel</a>
          <button type="submit" class="btn btn-primary flex-fill">
            <i class="bi bi-check2-circle"></i> Save Customer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
