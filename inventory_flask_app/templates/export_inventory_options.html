{% extends "base.html" %}
{% block title %}Export Inventory{% endblock %}
{% block page_title %}Export Inventory{% endblock %}

{% block content %}
<div class="page-header animate-fade-up">
  <div>
    <h1 class="page-title">Export Inventory</h1>
    <div class="page-subtitle">Download filtered inventory records to Excel</div>
  </div>
  <div class="page-actions">
    <a href="javascript:history.back()" onclick="if(history.length<=1) window.location='{{ url_for('dashboard_bp.main_dashboard') }}'" class="btn btn-ghost">
      <i class="bi bi-arrow-left"></i> Back
    </a>
  </div>
</div>

<div class="animate-fade-up" style="max-width:520px;">
  <div class="card">
    <div class="card-body" style="padding:1.75rem;">
      <form method="POST" action="{{ url_for('exports_bp.inventory_export') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label">Filter by Model</label>
          <input type="text" name="model" class="form-control" placeholder="e.g. Latitude 7490">
        </div>
        <div class="mb-3">
          <label class="form-label">Filter by Asset Tag</label>
          <input type="text" name="asset_tag" class="form-control" placeholder="Asset tag">
        </div>
        <div class="mb-3">
          <label class="form-label">Filter by Processor</label>
          <input type="text" name="processor" class="form-control" placeholder="e.g. i5-8350U">
        </div>
        <div class="mb-3">
          <label class="form-label">Filter by GPU 1</label>
          <input type="text" name="gpu1" class="form-control" placeholder="GPU model">
        </div>
        <div class="row g-3 mb-4">
          <div class="col">
            <label class="form-label">From Date</label>
            <input type="date" name="from_date" class="form-control">
          </div>
          <div class="col">
            <label class="form-label">To Date</label>
            <input type="date" name="to_date" class="form-control">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-download"></i> Export Excel
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
